name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore HLX.slnx

      - name: Build (Release)
        run: dotnet build HLX.slnx --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test HLX.slnx --configuration Release --no-build
